<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}영단어 공부방{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="nav-brand">📚 영단어 공부방</a>
    <ul class="nav-links">
      <li><a href="{{ url_for('room') }}">홈</a></li>
      <li><a href="{{ url_for('lessons') }}">Lesson</a></li>
      <li><a href="{{ url_for('wordlist') }}">단어장</a></li>
      <li><a href="{{ url_for('add_word') }}">단어 추가</a></li>
      <li><a href="{{ url_for('upload_pdf') }}">파일 업로드</a></li>
      <li><a href="{{ url_for('quiz') }}">퀴즈</a></li>
    </ul>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
