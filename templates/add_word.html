{% extends "base.html" %}
{% block title %}단어 추가 - 영단어 공부방{% endblock %}

{% block content %}
<div class="page-header">
  <h1>단어 추가</h1>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-group">
      <label>영단어 *</label>
      <input type="text" name="word" class="input" placeholder="예: persevere" required autofocus>
    </div>
    <div class="form-group">
      <label>뜻 *</label>
      <input type="text" name="meaning" class="input" placeholder="예: 인내하다, 참고 견디다" required>
    </div>
    <div class="form-group">
      <label>예문</label>
      <textarea name="example" class="textarea" placeholder="예: She persevered through many challenges."></textarea>
    </div>
    <div class="form-group">
      <label>Lesson</label>
      <select name="lesson_id" class="select">
        <option value="">미지정</option>
        {% for lesson in lessons %}
        <option value="{{ lesson.id }}" {% if selected_lesson == lesson.id|string %}selected{% endif %}>
          {{ lesson.name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">추가하기</button>
      <a href="{{ url_for('wordlist') }}" class="btn btn-ghost">취소</a>
    </div>
  </form>
</div>
{% endblock %}
